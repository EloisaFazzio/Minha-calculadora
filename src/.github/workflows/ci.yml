name: CI Front-end

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Instalando Node e Build
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm run build